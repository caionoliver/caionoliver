name: Update README Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # roda todo dia à meia-noite (UTC)
  workflow_dispatch:        # permite rodar manualmente também

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Gerar card de stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=github_dark&show_icons=true&hide_border=true&title_color=47d6b0&icon_color=128264&text_color=ffffff"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&theme=github_dark&hide_border=true&title_color=47d6b0&text_color=ffffff
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitar os SVGs gerados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --cached --quiet || git commit -m "chore: atualizar stats cards"
          git push
